<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a1628"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="IPTV SV"/>
<title>IPTV Smarter SV</title>
<style>
  :root {
    --bg: #0a1628;
    --card: #0f1f3d;
    --border: #1e3a6e;
    --accent: #2563eb;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --subtle: #94a3b8;
    --input-bg: #1a2f55;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:var(--bg); font-family:'Segoe UI',Arial,sans-serif; color:var(--text); overflow-x:hidden; }
  button { font-family:inherit; cursor:pointer; border:none; }

  /* ── SPLASH ── */
  #splash {
    position:fixed; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; z-index:9999; transition:opacity .4s;
  }
  #splash .ico { font-size:3.5rem; }
  #splash h1 { color:#fff; font-size:1.5rem; font-weight:900; letter-spacing:-.5px; }
  #splash p  { color:#60a5fa; font-size:.72rem; letter-spacing:2px; font-weight:700; }
  #splash .bar { width:160px; height:3px; background:#1e3a6e; border-radius:99px; margin-top:20px; overflow:hidden; }
  #splash .fill { height:100%; width:0; background:linear-gradient(90deg,#2563eb,#10b981); border-radius:99px; animation:ld 1s ease forwards .2s; }
  @keyframes ld { to { width:100%; } }

  /* ── APP SHELL ── */
  #app { display:none; flex-direction:column; min-height:100dvh; }

  /* ── HEADER ── */
  .header {
    background:var(--card); border-bottom:1px solid var(--border);
    padding:12px 16px; display:flex; align-items:center; gap:10px;
    position:sticky; top:0; z-index:50;
  }
  .header .logo-box {
    width:36px; height:36px; background:linear-gradient(135deg,#003087,#2563eb);
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:1.15rem; flex-shrink:0;
  }
  .header .brand-name { font-weight:900; font-size:.92rem; color:#fff; }
  .header .brand-sub  { font-size:.6rem; color:#60a5fa; font-weight:700; letter-spacing:1.5px; }
  .header .search {
    flex:1; padding:8px 12px; background:var(--input-bg); border:1px solid var(--border);
    border-radius:9px; color:var(--text); font-size:.85rem; outline:none; min-width:0;
  }
  .header .search::placeholder { color:var(--muted); }

  /* ── STATS ── */
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px 14px; }
  .stat-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:11px 13px;
  }
  .stat-card .sl { font-size:.62rem; color:var(--muted); font-weight:700; letter-spacing:1px; margin-bottom:3px; }
  .stat-card .sv { font-size:1.7rem; font-weight:900; }

  /* ── TABS ── */
  .tabs {
    display:flex; background:var(--card); border-bottom:1px solid var(--border);
    overflow-x:auto; scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar { display:none; }
  .tab-btn {
    flex:1; padding:10px 6px; background:transparent; color:var(--muted);
    font-size:.75rem; font-weight:600; border-bottom:2px solid transparent;
    white-space:nowrap; display:flex; flex-direction:column; align-items:center; gap:2px;
    transition:all .15s; min-width:80px;
  }
  .tab-btn .ti { font-size:1rem; }
  .tab-btn.active { color:#fff; border-bottom-color:var(--accent); }
  .tab-badge {
    background:var(--red); color:#fff; border-radius:99px;
    padding:0 5px; font-size:.6rem; font-weight:800; line-height:1.5;
  }

  /* ── USER LIST ── */
  .user-list { padding:10px 14px 90px; }
  .empty { text-align:center; padding:48px 20px; color:var(--muted); }
  .empty .ei { font-size:2.5rem; margin-bottom:10px; }

  /* ── USER CARD ── */
  .ucard {
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:13px 14px; margin-bottom:10px; animation:fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .ucard-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .ucard-id { display:flex; align-items:center; gap:9px; }
  .ucard-avatar {
    width:38px; height:38px; background:linear-gradient(135deg,#003087,#2563eb);
    border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0;
  }
  .ucard-name { font-weight:800; font-size:.93rem; color:var(--text); }
  .ucard-uid  { font-size:.68rem; color:var(--muted); margin-top:1px; }
  .ucard-right { display:flex; align-items:center; gap:7px; }
  .badge { border-radius:99px; padding:3px 9px; font-size:.7rem; font-weight:800; }
  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  .ucard-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:11px; }
  .ucard-field { background:#0a1628; border-radius:8px; padding:7px 10px; }
  .ucard-field .fl { font-size:.62rem; color:var(--muted); margin-bottom:2px; }
  .ucard-field .fv { font-size:.82rem; font-weight:700; color:var(--text); }

  .ucard-actions { display:grid; grid-template-columns:1fr 1fr 1fr 44px 44px; gap:5px; }
  .act-btn {
    padding:9px 4px; border-radius:9px; font-size:.72rem; font-weight:700;
    color:#fff; display:flex; align-items:center; justify-content:center; gap:4px;
  }

  /* ── PAID BANNER ── */
  .paid-banner {
    background:linear-gradient(135deg,#052e16,#14532d);
    border:1.5px solid #16a34a; border-radius:10px;
    padding:10px 12px; margin-bottom:11px;
    display:flex; align-items:center; gap:10px; font-size:.78rem;
  }
  .paid-banner .pb-icon { font-size:1.3rem; flex-shrink:0; }
  .paid-banner .pb-label { color:#4ade80; font-weight:700; font-size:.68rem; letter-spacing:1px; }
  .paid-banner .pb-date  { color:#86efac; font-weight:600; margin-top:1px; }

  /* ── RENEWAL PREVIEW ── */
  .renew-logic {
    background:#0a1628; border:1px solid var(--border); border-radius:10px;
    padding:12px 13px; margin-bottom:14px; font-size:.8rem;
  }
  .renew-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid var(--border); }
  .renew-row:last-child { border-bottom:none; padding-bottom:0; }
  .renew-lbl { color:var(--muted); }
  .renew-val { font-weight:700; color:var(--text); }
  .renew-val.green { color:#34d399; font-size:.95rem; }
  .renew-val.red   { color:#f87171; }
  .renew-val.yellow{ color:#fbbf24; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--card); border-top:1px solid var(--border);
    display:flex; align-items:center; padding:6px 10px 10px;
    gap:6px; z-index:50; padding-bottom:max(10px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:6px 4px; background:transparent; border-radius:10px;
    color:var(--muted); font-size:.6rem; font-weight:600; transition:all .15s;
  }
  .nav-btn .ni { font-size:1.2rem; }
  .nav-btn.active { color:#60a5fa; background:rgba(37,99,235,.15); }
  .fab {
    width:48px; height:48px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg,#065f46,#10b981);
    font-size:1.6rem; color:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 16px rgba(16,185,129,.45);
  }

  /* ── MODAL OVERLAY ── */
  .overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:100;
    display:flex; align-items:flex-end; justify-content:center;
    animation:fadeIn .15s ease;
  }
  .sheet {
    background:var(--card); border-radius:20px 20px 0 0;
    width:100%; max-width:520px; max-height:92dvh;
    display:flex; flex-direction:column; overflow:hidden;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:none; opacity:1; } }
  .sheet-handle { width:40px; height:4px; background:var(--border); border-radius:99px; margin:11px auto 0; flex-shrink:0; }
  .sheet-header {
    padding:12px 18px 11px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
  }
  .sheet-title-sub { font-size:.68rem; font-weight:700; color:var(--accent); letter-spacing:1.5px; }
  .sheet-title     { font-size:1rem; font-weight:800; color:#fff; margin-top:2px; }
  .close-btn {
    width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.1);
    color:var(--text); font-size:1rem; font-weight:700; display:flex; align-items:center; justify-content:center;
  }
  .sheet-body { overflow-y:auto; padding:16px 18px 24px; flex:1; }

  /* ── FORM ── */
  .field-label { display:block; font-size:.68rem; font-weight:700; color:var(--subtle); letter-spacing:1px; margin-bottom:5px; }
  .field-input, .field-select {
    width:100%; padding:11px 13px; background:var(--input-bg); border:1.5px solid var(--border);
    border-radius:9px; color:var(--text); font-size:.92rem; outline:none; margin-bottom:13px;
    font-family:inherit; appearance:none; -webkit-appearance:none;
  }
  .field-input:focus, .field-select:focus { border-color:var(--accent); }
  .field-input::placeholder { color:var(--muted); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  /* ── PREVIEW BOX ── */
  .preview {
    background:#0a1628; border:1px solid var(--border); border-radius:12px;
    padding:14px; margin-bottom:16px; display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .preview .pl { font-size:.65rem; color:var(--muted); margin-bottom:2px; }
  .preview .pv { font-weight:800; font-size:.88rem; color:var(--text); }
  .preview .pv.big { font-size:1.15rem; color:#34d399; }
  .preview .pv.red { color:#f87171; }

  /* ── PRIMARY BUTTON ── */
  .btn-primary {
    width:100%; padding:13px; border-radius:12px; font-weight:800;
    font-size:.95rem; color:#fff; margin-bottom:9px; transition:opacity .15s;
  }
  .btn-primary:active { opacity:.8; }
  .btn-secondary {
    width:100%; padding:11px; border-radius:12px; font-weight:700;
    font-size:.88rem; background:var(--input-bg); color:var(--subtle);
  }

  /* ── DISCOUNT TAG ── */
  .disc-tag {
    display:inline-flex; align-items:center; gap:4px;
    background:linear-gradient(135deg,#7f1d1d,#dc2626);
    color:#fff; border-radius:99px; padding:2px 8px;
    font-size:.62rem; font-weight:800; letter-spacing:.5px;
  }
  .promo-banner {
    background:linear-gradient(135deg,#1c1917,#44403c);
    border:1.5px solid #f59e0b; border-radius:10px;
    padding:9px 12px; margin-bottom:10px;
    display:flex; align-items:center; gap:10px; font-size:.78rem;
  }
  .promo-banner .pb-icon { font-size:1.2rem; flex-shrink:0; }
  .promo-banner .pb-label { color:#fbbf24; font-weight:700; font-size:.68rem; letter-spacing:1px; }
  .promo-banner .pb-date  { color:#fde68a; font-weight:600; margin-top:1px; }

  /* ── BACKUP BAR ── */
  .backup-bar {
    background:var(--card); border-top:1px solid var(--border);
    padding:8px 14px; display:flex; gap:8px; align-items:center;
  }
  .backup-bar span { font-size:.68rem; color:var(--muted); flex:1; }
  .bk-btn {
    padding:6px 12px; border-radius:8px; font-size:.72rem; font-weight:700;
    background:var(--input-bg); color:var(--subtle); border:1px solid var(--border);
  }

  /* ── DELETE CONFIRM ── */
  .delete-center { text-align:center; padding:16px 0 20px; }
  .delete-icon { font-size:2.8rem; margin-bottom:12px; }
  .delete-msg { color:var(--subtle); font-size:.88rem; line-height:1.6; }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#1e3a6e; color:#fff; padding:10px 20px; border-radius:99px;
    font-size:.82rem; font-weight:700; opacity:0; transition:all .25s; z-index:200; white-space:nowrap;
    pointer-events:none;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="ico">📺</div>
  <h1>IPTV SMARTER SV</h1>
  <p>PANEL DE GESTIÓN</p>
  <div class="bar"><div class="fill"></div></div>
</div>

<!-- APP -->
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-box">📺</div>
    <div style="flex:0 0 auto">
      <div class="brand-name">IPTV SMARTER SV</div>
      <div class="brand-sub">PANEL DE GESTIÓN</div>
    </div>
    <input class="search" id="searchInput" placeholder="🔍 Buscar usuario…" oninput="renderList()"/>
  </div>

  <!-- STATS -->
  <div class="stats" id="statsRow"></div>

  <!-- TABS -->
  <div class="tabs" id="tabsRow"></div>

  <!-- LIST -->
  <div class="user-list" id="userList"></div>

  <!-- BACKUP BAR -->
  <div class="backup-bar">
    <span id="backupStatus">💾 Datos guardados en tu celular</span>
    <button class="bk-btn" onclick="exportData()">⬆️ Exportar</button>
    <button class="bk-btn" onclick="document.getElementById('importFile').click()">⬇️ Importar</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"/>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav" id="bottomNav"></div>

</div>

<!-- MODAL CONTAINER -->
<div id="modalContainer"></div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const fmt = d => { if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };
const today = () => new Date().toISOString().split('T')[0];

function addMonths(dateStr, n) {
  if(!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  d.setMonth(d.getMonth() + n);
  return d.toISOString().split('T')[0];
}

function daysLeft(exp) {
  if(!exp) return 999;
  return Math.ceil((new Date(exp+'T12:00:00') - new Date()) / 86400000);
}

function getBadge(days) {
  if(days < 0)  return { label:'Vencido', bg:'#fee2e2', fg:'#dc2626' };
  if(days <= 7) return { label:`${days}d`, bg:'#fef3c7', fg:'#d97706' };
  return               { label:`${days}d`, bg:'#d1fae5', fg:'#059669' };
}

function uid() { return Date.now(); }

function invNum() {
  const n=new Date(), p=(x,l=2)=>String(x).padStart(l,'0');
  return `${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}-${p(Math.floor(Math.random()*9000)+1000,4)}`;
}

function toast(msg) {
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════
const SEED = [
  {id:190967,username:'AnaPena0626',  expiration:'2026-07-12',connections:2,online:true },
  {id:190004,username:'JoseD0626',    expiration:'2026-07-09',connections:3,online:true },
  {id:189665,username:'Carlos0626',   expiration:'2026-10-08',connections:3,online:true },
  {id:189083,username:'Gerson26',     expiration:'2026-07-04',connections:2,online:true },
  {id:176423,username:'Antpac26',     expiration:'2026-06-22',connections:3,online:false},
  {id:168796,username:'Wilren25',     expiration:'2026-07-01',connections:3,online:true },
  {id:164197,username:'AriasBro25',   expiration:'2026-07-06',connections:3,online:true },
  {id:155001,username:'Edwtob25',     expiration:'2026-06-20',connections:3,online:true },
  {id:144289,username:'Ramven25',     expiration:'2026-06-29',connections:3,online:true },
  {id:144230,username:'Kevinrys97',   expiration:'2026-07-11',connections:3,online:false},
  {id:17684, username:'Leonay-21',    expiration:'2026-07-29',connections:3,online:true },
];

function loadUsers() {
  try {
    const raw = localStorage.getItem('iptv_users');
    return raw ? JSON.parse(raw) : [...SEED];
  } catch(e) { return [...SEED]; }
}

function saveUsers(arr) {
  localStorage.setItem('iptv_users', JSON.stringify(arr));
}

let users = loadUsers();

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let activeTab = 'all'; // all | expiring | expired

function getExpiring() { return users.filter(u=>{ const d=daysLeft(u.expiration); return d>=0&&d<=7; }); }
function getExpired()  { return users.filter(u=>daysLeft(u.expiration)<0); }
function getOnline()   { return users.filter(u=>u.online); }

function getFiltered() {
  const q = ($('searchInput')||{value:''}).value.toLowerCase();
  let list = activeTab==='expiring' ? getExpiring()
           : activeTab==='expired'  ? getExpired()
           : [...users];
  if(q) list = list.filter(u=>u.username.toLowerCase().includes(q)||String(u.id).includes(q));
  return list;
}

// ═══════════════════════════════════════════════════════
//  RENDER STATS
// ═══════════════════════════════════════════════════════
function renderStats() {
  const items = [
    {label:'TOTAL',      val:users.length,         col:'#60a5fa', icon:'👥'},
    {label:'ONLINE',     val:getOnline().length,    col:'#34d399', icon:'🟢'},
    {label:'POR VENCER', val:getExpiring().length,  col:'#fbbf24', icon:'⚠️'},
    {label:'VENCIDOS',   val:getExpired().length,   col:'#f87171', icon:'❌'},
  ];
  $('statsRow').innerHTML = items.map(s=>`
    <div class="stat-card">
      <div class="sl">${s.icon} ${s.label}</div>
      <div class="sv" style="color:${s.col}">${s.val}</div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════
//  RENDER TABS + BOTTOM NAV
// ═══════════════════════════════════════════════════════
const TABS = [
  {id:'all',      icon:'👥', label:'Todos'   },
  {id:'expiring', icon:'⏰', label:'Por vencer'},
  {id:'expired',  icon:'🔴', label:'Vencidos' },
];

function renderTabs() {
  $('tabsRow').innerHTML = TABS.map(t=>{
    const count = t.id==='expiring' ? getExpiring().length : t.id==='expired' ? getExpired().length : 0;
    return `<button class="tab-btn ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">
      <span class="ti">${t.icon}</span>
      <span>${t.label}</span>
      ${count>0?`<span class="tab-badge">${count}</span>`:''}
    </button>`;
  }).join('');

  $('bottomNav').innerHTML = TABS.map(t=>{
    const count = t.id==='expiring' ? getExpiring().length : t.id==='expired' ? getExpired().length : 0;
    return `<button class="nav-btn ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">
      <span class="ni">${t.icon}</span>
      <span>${t.label}</span>
      ${count>0?`<span class="tab-badge">${count}</span>`:''}
    </button>`;
  }).join('') + `<button class="fab" onclick="openAdd()">+</button>`;
}

function setTab(id) { activeTab=id; renderAll(); }

// ═══════════════════════════════════════════════════════
//  RENDER USER LIST
// ═══════════════════════════════════════════════════════
function renderList() {
  const list = getFiltered();
  if(!list.length) {
    $('userList').innerHTML = `<div class="empty"><div class="ei">🔍</div><div>Sin resultados</div></div>`;
    return;
  }
  $('userList').innerHTML = list.map(u=>{
    const days = daysLeft(u.expiration);
    const b    = getBadge(days);
    return `
    <div class="ucard">
      <div class="ucard-top">
        <div class="ucard-id">
          <div class="ucard-avatar">📺</div>
          <div>
            <div class="ucard-name">${esc(u.username)}</div>
            <div class="ucard-uid">ID: ${u.id}</div>
          </div>
        </div>
        <div class="ucard-right">
          <span class="badge" style="background:${b.bg};color:${b.fg}">${b.label}</span>
          <span class="dot" style="background:${u.online?'#10b981':'#475569'}"></span>
        </div>
      </div>
      <div class="ucard-grid">
        <div class="ucard-field"><div class="fl">Vence</div><div class="fv">${fmt(u.expiration)}</div></div>
        <div class="ucard-field"><div class="fl">Conexiones</div><div class="fv">${u.connections}</div></div>

function updatePayPreview(id) {
  const u        = users.find(x=>x.id===id);
  const payDate  = $('p_date').value || today();
  const months   = parseInt($('p_months').value) || 1;
  const price    = parseFloat($('p_price').value) || 0;
  const discType = $('p_disc_type') ? $('p_disc_type').value : 'none';
  const discVal  = $('p_disc_val')  ? parseFloat($('p_disc_val').value)||0 : 0;

  const expDate     = new Date(u.expiration + 'T12:00:00');
  const confirmDate = new Date(payDate + 'T12:00:00');
  const isLate      = confirmDate > expDate;
  const baseDate    = isLate ? payDate : u.expiration;
  const newExp      = addMonths(baseDate, months);

  const subtotal = months * price;
  const discount = discType==='pct' ? (subtotal * discVal/100) : discType==='fixed' ? discVal : 0;
  const total    = Math.max(0, subtotal - discount);

  if($('pp_old'))     $('pp_old').textContent     = fmt(u.expiration);
  if($('pp_confirm')) $('pp_confirm').textContent  = fmt(payDate);
  if($('pp_base'))    $('pp_base').textContent     = isLate
    ? `Desde confirmación (venció hace ${Math.ceil((confirmDate-expDate)/86400000)}d)`
    : `Desde vencimiento actual (al día ✓)`;
  if($('pp_new'))     $('pp_new').textContent      = fmt(newExp);
  if($('pp_total'))   $('pp_total').textContent    = discount > 0
    ? `$${total.toFixed(2)} (desc. $${discount.toFixed(2)})`
    : `$${total.toFixed(2)}`;

  $('payPreview').dataset.newExp   = newExp;
  $('payPreview').dataset.isLate   = isLate ? '1' : '0';
}

function confirmPay(id) {
  const preview   = $('payPreview');
  const newExp    = preview.dataset.newExp;
  const payDate   = $('p_date').value || today();
  const months    = parseInt($('p_months').value) || 1;
  const price     = parseFloat($('p_price').value) || 0;
  const discType  = $('p_disc_type') ? $('p_disc_type').value : 'none';
  const discVal   = $('p_disc_val')  ? parseFloat($('p_disc_val').value)||0 : 0;

  const idx = users.findIndex(x=>x.id===id);
  if(idx===-1) return;

  // Store promo if applied
  let promo = null;
  if(discType !== 'none' && discVal > 0) {
    promo = { type: discType, value: discVal, label: $('p_disc_label').value.trim() || 'Descuento' };
  }

  users[idx] = { ...users[idx], expiration: newExp, lastPaid: payDate, ...(promo ? {promo} : {promo:null}) };
  saveUsers(users);
  closeModal();
  renderAll();
  toast(`✅ Renovado hasta ${fmt(newExp)}`);

  // Ask to print proof
  setTimeout(()=>{
    if(window.confirm(`¿Imprimir comprobante para ${users.find(x=>x.id===id)?.username}?`)) {
      openProof(id);
    }
  }, 400);
}

//  EXPORT / IMPORT — backup de datos
// ═══════════════════════════════════════════════════════
function exportData() {
  const data = JSON.stringify(users, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = today().replace(/-/g,'');
  a.href = url; a.download = `iptv-backup-${date}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('⬆️ Backup exportado');
}

function importData(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if(!Array.isArray(imported)) throw new Error('Formato inválido');
      if(window.confirm(`¿Importar ${imported.length} usuarios? Esto reemplazará los datos actuales.`)) {
        users = imported;
        saveUsers(users);
        renderAll();
        toast(`✅ ${imported.length} usuarios importados`);
      }
    } catch(err) { toast('❌ Archivo inválido'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ═══════════════════════════════════════════════════════
//  RECEIPT — lógica de fechas corregida
//  FACTURA  → vencimiento actual del usuario
//  PAGO     → vencimiento actual + meses pagados
// ═══════════════════════════════════════════════════════
function openReceipt(id) { openDoc(id,'receipt'); }
function openProof(id)   { openDoc(id,'proof');   }

function openDoc(id, mode) {
  const u = users.find(x=>x.id===id);
  if(!u) return;
  const isProof = mode==='proof';

  // For proof: if user already has lastPaid recorded, use that renewal date
  const proofNote = isProof && u.lastPaid
    ? `<div class="paid-banner" style="margin-bottom:12px">
        <div class="pb-icon">💰</div>
        <div>
          <div class="pb-label">PAGO CONFIRMADO EL ${fmt(u.lastPaid)}</div>
          <div class="pb-date">Nuevo vencimiento: ${fmt(u.expiration)}</div>
        </div>
      </div>` : '';

  openModal(sheetTop(
    isProof ? 'COMPROBANTE DE PAGO' : 'GENERAR FACTURA',
    u.username
  ) + proofNote + `
    <label class="field-label">NOMBRE DEL CLIENTE</label>
    <input class="field-input" id="d_name" placeholder="Nombre completo" value="${esc(u.username)}"/>

    <div class="grid2">
      <div>
        <label class="field-label">MESES</label>
        <select class="field-select" id="d_months" onchange="updatePreview(${id},'${mode}')">
          ${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${i===0?'selected':''}>${i+1} ${i===0?'mes':'meses'}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="field-label">PRECIO/MES ($)</label>
        <input class="field-input" id="d_price" type="number" value="12" min="1" oninput="updatePreview(${id},'${mode}')"/>
      </div>
    </div>

    <div class="preview" id="docPreview">
      <div><div class="pl">${isProof?'Vence actualmente':'Vence actualmente'}</div>
           <div class="pv red" id="prev_exp">${fmt(u.expiration)}</div></div>
      <div><div class="pl">${isProof?'Nuevo vencimiento (en doc)':'Fecha en factura'}</div>
           <div class="pv red" id="prev_new">${isProof ? fmt(addMonths(u.expiration,1)) : fmt(u.expiration)}</div></div>
      <div><div class="pl">Período</div>
           <div class="pv" id="prev_period">1 mes</div></div>
      <div><div class="pl">Total</div>
           <div class="pv big" id="prev_total">$12.00</div></div>
    </div>

    <button class="btn-primary" style="background:linear-gradient(135deg,#003087,#2563eb)"
      onclick="printDoc(${id},'${mode}')">
      🖨️ ${isProof?'Imprimir Comprobante':'Imprimir Factura'}
    </button>
    <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
  </div>`);
}

function updatePreview(id, mode) {
  const u      = users.find(x=>x.id===id);
  const months = parseInt($('d_months').value)||1;
  const price  = parseFloat($('d_price').value)||0;
  const total  = months * price;
  const isProof = mode==='proof';

  // FACTURA  → muestra vencimiento actual (no cambia con meses)
  // COMPROBANTE → muestra vencimiento actual + meses pagados
  const newExp = isProof ? addMonths(u.expiration, months) : u.expiration;

  if($('prev_exp'))    $('prev_exp').textContent    = fmt(u.expiration);
  if($('prev_new'))    $('prev_new').textContent    = fmt(newExp);
  if($('prev_period')) $('prev_period').textContent = `${months} ${months===1?'mes':'meses'}`;
  if($('prev_total'))  $('prev_total').textContent  = `$${total.toFixed(2)}`;
}

function printDoc(id, mode) {
  const u       = users.find(x=>x.id===id);
  const name    = $('d_name').value.trim() || u.username;
  const months  = parseInt($('d_months').value)||1;
  const price   = parseFloat($('d_price').value)||0;
  const num     = invNum();
  const isProof = mode==='proof';

  // Discount: use promo stored on user if exists, else check manual fields
  let discType  = 'none', discVal = 0, discLabel = '';
  if(u.promo) {
    discType  = u.promo.type;
